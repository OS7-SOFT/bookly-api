default: &default
  adapter: postgresql
  encoding: unicode
  host: <%= ENV.fetch("BOOKLY_DATABASE_HOST", "localhost") %>
  username: <%= ENV.fetch("BOOKLY_DATABASE_USERNAME") %>
  password: <%= ENV.fetch("BOOKLY_DATABASE_PASSWORD") %>
  pool: <%= ENV.fetch("RAILS_MAX_THREADS", 5) %>

development:
  <<: *default
  database: <%= ENV.fetch("BOOKLY_DATABASE_DEVELOPMENT") %>

test:
  <<: *default
  database: <%= ENV.fetch("BOOKLY_DATABASE_TEST") %>

production:
  <<: *default
  database: <%= ENV["BOOKLY_DATABASE_PRODUCTION"] %>
  username: <%= ENV["BOOKLY_DATABASE_USERNAME"] %>
  password: <%= ENV["BOOKLY_DATABASE_PASSWORD"] %>
  host: <%= ENV["BOOKLY_DATABASE_HOST"] %>
  url: <%= ENV["DATABASE_URL"] %>
