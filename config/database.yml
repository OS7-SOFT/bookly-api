default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS", 5) %>

development:
  <<: *default
  host: <%= ENV["BOOKLY_DATABASE_HOST"] || "localhost" %>
  username: <%= ENV["BOOKLY_DATABASE_USERNAME"] %>
  password: <%= ENV["BOOKLY_DATABASE_PASSWORD"] %>
  database: <%= ENV["BOOKLY_DATABASE_DEVELOPMENT"] %>

test:
  <<: *default
  host: <%= ENV["BOOKLY_DATABASE_HOST"] || "localhost" %>
  username: <%= ENV["BOOKLY_DATABASE_USERNAME"] %>
  password: <%= ENV["BOOKLY_DATABASE_PASSWORD"] %>
  database: <%= ENV["BOOKLY_DATABASE_TEST"] %>

production:
  <<: *default
  url: <%= ENV["DATABASE_URL"] %>
